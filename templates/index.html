<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>书影音追踪 - 首页</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <nav>
        <a href="/" class="active">首页</a>
        <a href="/stats">统计看板</a>
        <a href="/wantlist">想看清单</a>
    </nav>
    
    <div class="container">
        <h1>书影音收藏追踪</h1>
        
        <div class="card">
            <h2>新增条目</h2>
            <div class="tabs">
                <button class="tab active" data-type="book">书籍</button>
                <button class="tab" data-type="movie">影视</button>
                <button class="tab" data-type="music">音乐</button>
            </div>
            
            <form id="item-form">
                <div class="form-row">
                    <div class="form-group">
                        <label>标题 *</label>
                        <input type="text" id="title" required>
                    </div>
                    <div class="form-group">
                        <label id="creator-label">作者</label>
                        <input type="text" id="creator">
                    </div>
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label>标签 <span class="hint">（输入后回车确认）</span></label>
                        <div class="tag-input-wrapper" id="tag-input">
                            <div class="tag-input-tags" id="tag-tags"></div>
                            <input type="text" id="tag-field" placeholder="输入标签，回车添加" autocomplete="off">
                            <div class="tag-suggestions" id="tag-suggestions"></div>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>状态</label>
                        <select id="status">
                            <option value="want">想看</option>
                            <option value="doing">在看</option>
                            <option value="done">看过</option>
                        </select>
                    </div>
                </div>
                
                <div class="rating-dim-block">
                    <div class="rating-dim-title">多维评分</div>
                    <div class="rating-dim-grid" id="rating-dim-grid"></div>
                    <div class="rating-dim-avg">
                        综合分：<span id="rating-avg-preview">未评分</span>
                    </div>
                </div>
                
                <div class="form-row" id="episode-fields" style="display: none;">
                    <div class="form-group">
                        <label>总集数</label>
                        <input type="number" id="total_episodes" min="0">
                    </div>
                    <div class="form-group">
                        <label>当前集数</label>
                        <input type="number" id="current_episode" min="0" value="0">
                    </div>
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label>开始日期</label>
                        <input type="date" id="start_date">
                    </div>
                    <div class="form-group">
                        <label>结束日期</label>
                        <input type="date" id="end_date">
                    </div>
                </div>
                
                <div class="form-group">
                    <label>短评</label>
                    <textarea id="comment" rows="2"></textarea>
                </div>
                
                <button type="submit" class="btn btn-primary">添加</button>
            </form>
        </div>
        
        <div class="card">
            <h2>高级筛选</h2>
            <div class="filter-bar" id="filter-bar">
                <div class="filter-row">
                    <div class="filter-item">
                        <label>类型</label>
                        <div class="chip-group" id="filter-types">
                            <span class="chip" data-value="book">书籍</span>
                            <span class="chip" data-value="movie">影视</span>
                            <span class="chip" data-value="music">音乐</span>
                        </div>
                    </div>
                    <div class="filter-item">
                        <label>状态</label>
                        <div class="chip-group" id="filter-statuses">
                            <span class="chip" data-value="want">想看</span>
                            <span class="chip" data-value="doing">在看</span>
                            <span class="chip" data-value="done">看过</span>
                        </div>
                    </div>
                </div>
                <div class="filter-row">
                    <div class="filter-item filter-tags-item">
                        <label>标签</label>
                        <div class="filter-tag-wrap">
                            <select id="filter-tag-select"><option value="">-- 选择标签 --</option></select>
                            <div class="chip-group chip-group-selected" id="filter-tags-selected"></div>
                        </div>
                        <div class="tag-mode-switch">
                            逻辑：
                            <label><input type="radio" name="tag_mode" value="or" checked> 或（任意一个）</label>
                            <label><input type="radio" name="tag_mode" value="and"> 与（全部包含）</label>
                        </div>
                    </div>
                    <div class="filter-item">
                        <label>综合最低分</label>
                        <select id="filter-min-rating">
                            <option value="">不限</option>
                            <option value="5">5 星以上</option>
                            <option value="4">4 星以上</option>
                            <option value="3">3 星以上</option>
                            <option value="2">2 星以上</option>
                            <option value="1">1 星以上</option>
                        </select>
                    </div>
                    <div class="filter-item">
                        <label>维度筛选</label>
                        <div class="dim-filter-row">
                            <select id="filter-rating-dim"><option value="">-- 选择维度 --</option></select>
                            <select id="filter-rating-dim-min">
                                <option value="">不限</option>
                                <option value="5">≥ 5</option>
                                <option value="4">≥ 4</option>
                                <option value="3">≥ 3</option>
                                <option value="2">≥ 2</option>
                                <option value="1">≥ 1</option>
                            </select>
                        </div>
                    </div>
                </div>
                <div class="filter-row">
                    <div class="filter-item">
                        <label>日期范围</label>
                        <div class="date-range">
                            <input type="date" id="filter-date-from">
                            <span class="date-sep">至</span>
                            <input type="date" id="filter-date-to">
                        </div>
                    </div>
                    <div class="filter-item">
                        <label>年份</label>
                        <select id="filter-year"><option value="">不限</option></select>
                    </div>
                    <div class="filter-item filter-actions">
                        <button class="btn btn-secondary" id="filter-reset">重置</button>
                    </div>
                </div>
                <div class="filter-url-tip">
                    筛选条件已同步到 URL 中，可直接分享或刷新。
                </div>
            </div>
        </div>
        
        <div class="card">
            <h2>我的收藏</h2>
            <div class="tabs">
                <button class="filter-tab active" data-filter="all">全部</button>
                <button class="filter-tab" data-filter="book">书籍</button>
                <button class="filter-tab" data-filter="movie">影视</button>
                <button class="filter-tab" data-filter="music">音乐</button>
                <button class="filter-tab" data-filter="doing">在看</button>
                <button class="filter-tab" data-filter="done">看过</button>
            </div>
            <div id="item-list" class="item-list"></div>
        </div>
    </div>
    
    <div id="edit-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>编辑条目</h3>
                <button class="close-btn" onclick="closeModal()">&times;</button>
            </div>
            <form id="edit-form">
                <input type="hidden" id="edit-id">
                <div class="form-row">
                    <div class="form-group">
                        <label>标题</label>
                        <input type="text" id="edit-title" required>
                    </div>
                    <div class="form-group">
                        <label id="edit-creator-label">作者</label>
                        <input type="text" id="edit-creator">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>标签（回车确认）</label>
                        <div class="tag-input-wrapper" id="edit-tag-input">
                            <div class="tag-input-tags" id="edit-tag-tags"></div>
                            <input type="text" id="edit-tag-field" placeholder="输入标签，回车添加" autocomplete="off">
                            <div class="tag-suggestions" id="edit-tag-suggestions"></div>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>状态</label>
                        <select id="edit-status">
                            <option value="want">想看</option>
                            <option value="doing">在看</option>
                            <option value="done">看过</option>
                        </select>
                    </div>
                </div>
                <div class="rating-dim-block">
                    <div class="rating-dim-title">多维评分</div>
                    <div class="rating-dim-grid" id="edit-rating-dim-grid"></div>
                    <div class="rating-dim-avg">
                        综合分：<span id="edit-rating-avg-preview">未评分</span>
                    </div>
                </div>
                <div class="form-row" id="edit-episode-fields">
                    <div class="form-group">
                        <label>总集数</label>
                        <input type="number" id="edit-total_episodes" min="0">
                    </div>
                    <div class="form-group">
                        <label>当前集数</label>
                        <input type="number" id="edit-current_episodes" min="0">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>开始日期</label>
                        <input type="date" id="edit-start_date">
                    </div>
                    <div class="form-group">
                        <label>结束日期</label>
                        <input type="date" id="edit-end_date">
                    </div>
                </div>
                <div class="form-group">
                    <label>短评</label>
                    <textarea id="edit-comment" rows="2"></textarea>
                </div>
                <button type="submit" class="btn btn-primary">保存</button>
            </form>
        </div>
    </div>
    
    <div id="tooltip" class="radar-tooltip"></div>
    
    <script src="/static/js/app.js"></script>
</body>
</html>
